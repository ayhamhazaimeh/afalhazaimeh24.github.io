<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — [Your Full Name]</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>

    <nav>
        <div class="nav-inner">
            <div class="nav-logo">[SID]<span>@</span>portfolio</div>
            <div class="nav-links">
                <a href="index.html">home</a>
                <a href="contact.html" class="active">contact</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <section style="border-top:none; padding-top:56px;">
            <p class="section-label">Contact</p>
            <h2>Send me a message</h2>
            <p class="form-intro">$ ./contact.sh --new-message</p>

            <form>
                <div class="field">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
                </div>

                <div class="field">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="jane@example.com">
                </div>

                <div class="field">
                    <label for="country">Country</label>
                    <input type="text" id="country" name="country" placeholder="Jordan">
                </div>

                <div class="field">
                    <label for="comments">Comments</label>
                    <textarea id="comments" name="comments" placeholder="Write your message here..."></textarea>
                </div>

                <button type="button" onclick="validateForm()">Submit</button>
            </form>
        </section>

    </div>

    <footer>
        © 2026 [Your Full Name] — built for CIS341
    </footer>

    <!-- MODAL: shown after successful submission -->
    <div id="contactModal" class="modal-overlay">
        <div class="modal-box">
            <div class="terminal-bar">
                <span class="dot" style="background:#e5555a;"></span>
                <span class="dot" style="background:#e2b73a;"></span>
                <span class="dot" style="background:#4fe3c9;"></span>
                <span class="terminal-title">message_sent.log</span>
            </div>
            <div class="terminal-body">
                <p class="modal-heading">Thanks for reaching out!</p>
                <p class="modal-sub">You can also find me here:</p>

                <div class="contact-line">
                    <span class="label">instagram</span>
                    <span class="value"><a href="https://instagram.com/[your_username]" target="_blank" rel="noopener">@[your_username]</a></span>
                </div>
                <div class="contact-line">
                    <span class="label">phone</span>
                    <span class="value">[+962 xx xxx xxxx]</span>
                </div>
                <div class="contact-line">
                    <span class="label">email</span>
                    <span class="value"><a href="mailto:[your.personal@email.com]">[your.personal@email.com]</a></span>
                </div>

                <button class="modal-close" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
